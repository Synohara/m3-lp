<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">makotyo artist photo graphic</title>
  <desc id="desc">Square artist photo graphic for makotyo on Bandcamp.</desc>
  <defs>
    <radialGradient id="heat" cx="50%" cy="48%" r="70%">
      <stop offset="0" stop-color="#2d211a"/>
      <stop offset="0.54" stop-color="#111114"/>
      <stop offset="1" stop-color="#070709"/>
    </radialGradient>
    <pattern id="steps" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <rect x="6" y="8" width="6" height="6" fill="#e4e0d6" opacity="0.1"/>
      <rect x="26" y="22" width="6" height="6" fill="#e4e0d6" opacity="0.16"/>
      <path d="M0 39.5H40M39.5 0V40" stroke="#e4e0d6" stroke-opacity="0.045"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#heat)"/>
  <rect width="800" height="800" fill="url(#steps)"/>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.4"/>
  <rect x="42" y="42" width="716" height="716" fill="none" stroke="#e4e0d6" stroke-opacity="0.18" stroke-width="2"/>

  <g transform="translate(0 26)">
    <circle cx="330" cy="360" r="118" fill="none" stroke="#e4e0d6" stroke-width="3" stroke-opacity="0.76"/>
    <circle cx="470" cy="360" r="118" fill="none" stroke="#e4e0d6" stroke-width="3" stroke-opacity="0.76"/>
    <path d="M400 114C459 220 566 272 581 390C590 471 528 542 400 602C272 542 210 471 219 390C234 272 341 220 400 114Z" fill="#c24a1f" opacity="0.38"/>
  </g>

  <g fill="#e4e0d6" font-family="JetBrains Mono, Menlo, monospace" text-anchor="middle">
    <text x="400" y="382" font-size="24" letter-spacing="6">MAKOTYO</text>
    <text x="400" y="696" font-size="15" letter-spacing="4" opacity="0.48">POLISHED FLAME</text>
  </g>
</svg>

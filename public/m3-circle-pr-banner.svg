<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" role="img" aria-labelledby="title desc">
  <title id="title">Polished Flame M3 circle PR banner</title>
  <desc id="desc">M3 2026 spring PR banner for makotyo's Polished Flame EP.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08080a"/>
      <stop offset="0.48" stop-color="#16120e"/>
      <stop offset="1" stop-color="#0d0d10"/>
    </linearGradient>
    <pattern id="steps" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <circle cx="10" cy="12" r="2" fill="#e4e0d6" opacity="0.16"/>
      <circle cx="30" cy="42" r="2" fill="#e4e0d6" opacity="0.08"/>
      <circle cx="60" cy="24" r="2" fill="#f29470" opacity="0.18"/>
      <path d="M0 79.5H80M79.5 0V80" stroke="#e4e0d6" stroke-opacity="0.055"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1000" height="800" fill="url(#bg)"/>
  <rect width="1000" height="800" fill="url(#steps)"/>
  <rect width="1000" height="800" filter="url(#grain)" opacity="0.38"/>

  <g transform="translate(596 104)">
    <rect x="0" y="0" width="300" height="300" fill="#e4e0d6" opacity="0.08"/>
    <rect x="18" y="18" width="264" height="264" fill="none" stroke="#e4e0d6" stroke-opacity="0.28"/>
    <circle cx="116" cy="150" r="54" fill="none" stroke="#e4e0d6" stroke-width="2" stroke-opacity="0.82"/>
    <circle cx="184" cy="150" r="54" fill="none" stroke="#e4e0d6" stroke-width="2" stroke-opacity="0.82"/>
    <path d="M150 74C174 116 219 136 226 183C230 214 207 242 150 262C93 242 70 214 74 183C81 136 126 116 150 74Z" fill="#c24a1f" opacity="0.34"/>
    <text x="150" y="152" fill="#e4e0d6" font-family="JetBrains Mono, Menlo, monospace" font-size="17" text-anchor="middle" letter-spacing="4">POLISHED</text>
    <text x="150" y="177" fill="#e4e0d6" font-family="JetBrains Mono, Menlo, monospace" font-size="17" text-anchor="middle" letter-spacing="4">FLAME</text>
  </g>

  <g fill="#e4e0d6" font-family="JetBrains Mono, Menlo, monospace">
    <text x="84" y="114" font-size="22" letter-spacing="5" opacity="0.72">MAKOTYO</text>
    <text x="84" y="214" font-size="90" letter-spacing="0" font-weight="500">Polished</text>
    <text x="84" y="304" font-size="90" letter-spacing="0" font-weight="500">Flame<tspan fill="#c24a1f">.</tspan></text>
    <text x="88" y="366" font-size="22" letter-spacing="3" opacity="0.72">JUKE / FOOTWORK / CLASSICAL FRAGMENTS</text>
    <text x="88" y="423" font-size="19" letter-spacing="2" opacity="0.58">160 BPM の網目に、静謐と衝動を縫い込む5曲入りEP。</text>
  </g>

  <g transform="translate(84 562)" font-family="JetBrains Mono, Menlo, monospace">
    <rect x="0" y="0" width="832" height="104" fill="none" stroke="#e4e0d6" stroke-opacity="0.18"/>
    <path d="M0 52H832" stroke="#e4e0d6" stroke-opacity="0.12"/>
    <text x="26" y="36" fill="#f29470" font-size="21" letter-spacing="3">M3 2026 SPRING / ONLINE</text>
    <text x="26" y="78" fill="#e4e0d6" font-size="24" letter-spacing="3">[藍-22] よっこらレコーズ / A03</text>
    <text x="804" y="78" fill="#e4e0d6" font-size="16" letter-spacing="2" opacity="0.55" text-anchor="end">NAME YOUR PRICE</text>
  </g>

  <g transform="translate(84 712)" fill="#e4e0d6" font-family="JetBrains Mono, Menlo, monospace" font-size="15" letter-spacing="2" opacity="0.54">
    <text x="0" y="0">BANDCAMP: makotyo.bandcamp.com/album/polished-flame</text>
  </g>
</svg>
